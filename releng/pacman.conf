#
# Forge It OS — pacman.conf
# Based on the default Arch Linux pacman.conf
# Multilib is ENABLED for Steam and 32-bit app support.
#

[options]
HoldPkg     = pacman glibc
Architecture = auto

# Misc options
Color
CheckSpace
VerbosePkgLists
ParallelDownloads = 5
ILoveCandy

# Signature verification
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

#
# REPOSITORIES
# Order matters — searched top to bottom.
#

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[community]
Include = /etc/pacman.d/mirrorlist

# -------------------------------------------------------
# [multilib] — ENABLED
# Required for: Steam, Wine, 32-bit game libraries
# -------------------------------------------------------
[multilib]
Include = /etc/pacman.d/mirrorlist

# -------------------------------------------------------
# Uncomment to add a custom/AUR helper repo if needed:
# [chaotic-aur]
# Include = /etc/pacman.d/chaotic-mirrorlist
# -------------------------------------------------------
