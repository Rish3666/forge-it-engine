name: Arch ISO Builder

on:
  workflow_dispatch:
    inputs:
      packages:
        description: "List of packages to install"
        required: true
      userId:
        description: "ID of the user"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Build ISO via Docker
        run: |
          docker run --privileged \
            -v /dev:/dev \
            -v ${GITHUB_WORKSPACE}:/workspace \
            archlinux:latest bash -c "
              pacman-key --init && \
              pacman-key --populate archlinux && \
              pacman -Syu --noconfirm archiso sed && \
              cp -r /usr/share/archiso/configs/releng/ /tmp/build && \
              # Convert space-separated packages to one-per-line for archiso
              echo '${{ github.event.inputs.packages }}' | tr ' ' '\n' >> /tmp/build/packages.x86_64 && \
              mkdir -p /tmp/out && \
              mkarchiso -v -w /tmp/archiso-workspace -o /tmp/out /tmp/build && \
              cp /tmp/out/*.iso /workspace/arch-custom.iso
            "

      - name: Upload ISO
        uses: actions/upload-artifact@v6
        with:
          name: forge-it-${{ github.event.inputs.userId }}-arch
          path: arch-custom.iso
