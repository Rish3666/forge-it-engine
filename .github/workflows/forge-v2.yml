name: Forge It Enterprise Builder (v2)

on:
  repository_dispatch:
    types: [build_enterprise_iso]

jobs:
  forge_enterprise:
    runs-on: ubuntu-latest
    container:
      image: ${{ github.event.client_payload.docker_image }}
      options: --privileged --user root
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Bootstrap Builder Dependencies
        run: |
          # Universal Dependency Injection (mkosi + systemd tools)
          if command -v pacman &> /dev/null; then
            pacman -Sy --noconfirm python-pip systemd-container libisoburn squashfs-tools
          elif command -v apt-get &> /dev/null; then
            apt-get update && apt-get install -y python3-pip systemd-container mtools libisoburn squashfs-tools
          elif command -v dnf &> /dev/null; then
            dnf install -y python3-pip systemd-container libisoburn squashfs-tools
          fi
          
          # Install mkosi via PIP for cross-distro consistency
          pip3 install --upgrade mkosi

      - name: Generate mkosi Configuration
        run: |
          cat <<EOF > mkosi.default
          [Config]
          Format=iso
          Output=forge-it-enterprise.iso

          [Content]
          Packages=${{ github.event.client_payload.mapped_packages }}
          Autologin=yes
          EOF

      - name: Build Enterprise Image
        run: |
          # mkosi build --force --environment=SYSTEMD_LOG_LEVEL=debug
          # NOTE: mkosi requires a valid repository setup for the distro in the container
          # For a real production build, you'd ensure the mirrorlists are populated here.
          echo "Building Enterprise ISO with packages: ${{ github.event.client_payload.mapped_packages }}"
          # Mocking the finalize step as mkosi builds are intensive
          touch forge-it-enterprise.iso

      - name: Upload Enterprise Artifact
        uses: actions/upload-artifact@v4
        with:
          name: forge-it-enterprise-${{ github.event.client_payload.userId }}
          path: forge-it-enterprise.iso
          retention-days: 7
