name: Ubuntu ISO Builder

on:
  workflow_dispatch:
    inputs:
      packages:
        description: "List of packages"
        required: true
      userId:
        description: "User ID"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Build Tools
        run: sudo apt-get update && sudo apt-get install -y xorriso squashfs-tools wget

      - name: Download Base ISO
        run: wget http://releases.ubuntu.com/24.04/ubuntu-24.04-live-server-amd64.iso -O base.iso

      - name: Customize and Build
        run: |
          # Simplified for BTech logic. In production, use chroot/customization flow.
          echo "Installing: ${{ github.event.inputs.packages }}"
          mkdir output
          mv base.iso output/ubuntu-${{ github.event.inputs.userId }}.iso

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-custom-${{ github.event.inputs.userId }}
          path: output/*.iso
