name: Fedora ISO Builder

on:
  workflow_dispatch:
    inputs:
      packages:
        description: "Packages to include"
        required: true
      userId:
        description: "User Identifier"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build ISO via Docker
        run: |
          docker run --privileged \
            -v /dev:/dev \
            -v ${GITHUB_WORKSPACE}:/workspace \
            fedora:latest bash -c "
              dnf install -y lorax fedora-kickstarts && \
              # Build the ISO using livemedia-creator.
              livemedia-creator --make-iso --no-virt --ks /usr/share/fedora-kickstarts/fedora-live-workstation.ks --project 'Custom Fedora' --releasever 40 && \
              mv *.iso /workspace/fedora-custom.iso
            "

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: forge-it-${{ github.event.inputs.userId }}-fedora
          path: fedora-custom.iso
