name: Build Multi-Distro ISO

on:
  workflow_dispatch:
    inputs:
      distro:
        description: 'Target Distro (arch|ubuntu|fedora)'
        required: true
        default: 'arch'
      packages:
        description: 'Comma separated packages'
        required: true
      config_payload:
        description: 'Distro specific config (preseed/kickstart)'
        required: false
      userId:
        description: 'User ID'
        required: true

env:
  DISTRO: ${{ github.event.inputs.distro }}
  PACKAGES: ${{ github.event.inputs.packages }}
  CONFIG: ${{ github.event.inputs.config_payload }}
  USER_ID: ${{ github.event.inputs.userId }}

jobs:
  forge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- BRANCH 1: ARCH LINUX ---
      - name: Build Arch ISO
        if: ${{ env.DISTRO == 'arch' }}
        container:
          image: archlinux:latest
          options: --privileged
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Sy --noconfirm archiso squashfs-tools libisoburn
          
          # Inject packages
          echo "" >> ./releng/packages.x86_64
          echo "# --- Forge It User Packages ---" >> ./releng/packages.x86_64
          echo "$PACKAGES" | tr ',' '\n' | sed 's/^ *//;s/ *$//' | grep -v '^$' >> ./releng/packages.x86_64
          
          mkarchiso -v -w /tmp/forge-work -o /tmp/output ./releng
          mv /tmp/output/*.iso ./forge-it-arch.iso

      # --- BRANCH 2: UBUNTU (The Lazy Autoinstall Way) ---
      - name: Build Ubuntu ISO
        if: ${{ env.DISTRO == 'ubuntu' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso sed curl
          
          # Download base ISO (Jammy)
          curl -L -o base-ubuntu.iso https://releases.ubuntu.com/22.04/ubuntu-22.04.3-live-server-amd64.iso
          
          # Create Autoinstall User-Data
          mkdir -p ./iso-source/ncloud
          echo "$CONFIG" > ./iso-source/ncloud/user-data
          touch ./iso-source/ncloud/meta-data
          
          # Note: Simplified injection logic for brevity
          echo "Building Ubuntu ISO with packages: $PACKAGES"
          # In a real scenario, you'd use xorriso to add the /ncloud/ folder to the ISO filesystem
          # and update GRUB to include 'autoinstall ds=ncloud' in the boot params.
          mv base-ubuntu.iso forge-it-ubuntu.iso

      # --- BRANCH 3: FEDORA (The Kickstart Way) ---
      - name: Build Fedora ISO
        if: ${{ env.DISTRO == 'fedora' }}
        run: |
          echo "Building Fedora with Kickstart config..."
          echo "$CONFIG" > kickstart.ks
          # Mocking the build for now - real lorax builds are heavy for CI
          touch forge-it-fedora.iso

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: forge-it-${{ env.USER_ID }}-${{ env.DISTRO }}
          path: forge-it-*.iso
          retention-days: 3
